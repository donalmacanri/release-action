name: Approve and Merge Release

on:
  release:
    types: [edited]

env:
  ALLOWED_APPROVERS: ${{ vars.RELEASE_MANAGERS }}

jobs:
  check-approval:
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.check.outputs.approved }}
      source_branch: ${{ steps.parse.outputs.source_branch }}
      target_branch: ${{ steps.parse.outputs.target_branch }}

    steps:
      - name: Check if draft release
        if: github.event.release.draft != true
        run: |
          echo "Release is not a draft, skipping"
          exit 0

      - name: Check authorized approver
        id: auth
        run: |
          ALLOWED="${{ env.ALLOWED_APPROVERS }}"
          ACTOR="${{ github.event.sender.login }}"

          # Default to repo owner if not set
          if [ -z "$ALLOWED" ]; then
            ALLOWED="${{ github.repository_owner }}"
          fi

          echo "Editor: $ACTOR"
          echo "Allowed approvers: $ALLOWED"

          if [[ ! ",$ALLOWED," =~ ",$ACTOR," ]]; then
            echo "::notice::User $ACTOR is not authorized to approve - ignoring edit"
            echo "authorized=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "✓ User $ACTOR is authorized"
          echo "authorized=true" >> $GITHUB_OUTPUT

      - name: Check approval checkbox
        id: check
        if: steps.auth.outputs.authorized == 'true'
        run: |
          BODY='${{ github.event.release.body }}'

          # Check for checked approval checkbox
          # Matches: - [x] **I approve merging
          if echo "$BODY" | grep -qE '\- \[x\] \*\*I approve merging'; then
            echo "✓ Approval checkbox is checked"
            echo "approved=true" >> $GITHUB_OUTPUT
          else
            echo "Approval checkbox not checked - ignoring edit"
            echo "approved=false" >> $GITHUB_OUTPUT
          fi

      - name: Parse merge details from release body
        id: parse
        if: steps.check.outputs.approved == 'true'
        run: |
          BODY='${{ github.event.release.body }}'

          # Extract source and target branches from the checkbox line
          # Format: - [x] **I approve merging `source` into `target`**
          SOURCE=$(echo "$BODY" | grep -oP "I approve merging \`\K[^\`]+" | head -1)
          TARGET=$(echo "$BODY" | grep -oP "into \`\K[^\`]+" | head -1)

          if [ -z "$SOURCE" ] || [ -z "$TARGET" ]; then
            echo "::error::Could not parse source/target branches from release body"
            exit 1
          fi

          echo "source_branch=$SOURCE" >> $GITHUB_OUTPUT
          echo "target_branch=$TARGET" >> $GITHUB_OUTPUT
          echo "Parsed: $SOURCE → $TARGET"

  merge:
    needs: check-approval
    if: needs.check-approval.outputs.approved == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch branches
        run: |
          git fetch origin ${{ needs.check-approval.outputs.source_branch }}
          git fetch origin ${{ needs.check-approval.outputs.target_branch }}

      - name: Checkout target branch
        run: |
          git checkout ${{ needs.check-approval.outputs.target_branch }}
          git pull origin ${{ needs.check-approval.outputs.target_branch }}

      - name: Merge source into target
        run: |
          SOURCE="${{ needs.check-approval.outputs.source_branch }}"
          TARGET="${{ needs.check-approval.outputs.target_branch }}"
          TAG="${{ github.event.release.tag_name }}"

          echo "Merging $SOURCE into $TARGET"
          git merge origin/$SOURCE --no-ff -m "Merge $SOURCE into $TARGET for release $TAG"

      - name: Push merged changes
        run: |
          git push origin ${{ needs.check-approval.outputs.target_branch }}
          echo "✓ Successfully merged"

      - name: Publish release (remove draft status)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Merge Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Source** | ${{ needs.check-approval.outputs.source_branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Target** | ${{ needs.check-approval.outputs.target_branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Release** | ${{ github.event.release.tag_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Approved By** | @${{ github.event.sender.login }} |" >> $GITHUB_STEP_SUMMARY
